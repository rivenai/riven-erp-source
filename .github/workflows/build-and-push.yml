name: Build and Push Riven ERP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      odoo_version:
        description: 'Odoo version branch or tag'
        required: false
        default: '19.0'

env:
  REGISTRY: rivencommerceacr.azurecr.io
  SOURCE_IMAGE: rivencommerceacr.azurecr.io/riven-erp-source
  IMAGE: rivencommerceacr.azurecr.io/riven-erp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            ODOO_VERSION=${{ github.event.inputs.odoo_version || '19.0' }}
          tags: |
            ${{ env.SOURCE_IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
